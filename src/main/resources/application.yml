spring:
  application:
    name: team3-backend-batch

  profiles:
    include: db, secret

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  batch:
    job:
      enabled: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${BATCH_KAFKA_CONSUMER_GROUP_ID:team3-batch}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.ohgiraffers.team3backendbatch
  configuration:
    map-underscore-to-camel-case: true

jwt:
  expiration: 1800000
  refresh-expiration: 604800000

batch:
  schedule:
    enabled: false
    zone: Asia/Seoul
    quantitative-cron: 0 0 1 * * *
    qualitative-normalization-cron: 0 15 1 1 * *
    score-cron: 0 30 1 * * *
    promotion-cron: 0 0 2 * * *

nlp:
  google:
    credentials-location: ${BATCH_GOOGLE_CREDENTIALS_LOCATION:${GOOGLE_APPLICATION_CREDENTIALS:}}